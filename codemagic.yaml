workflows:
  ios-sideload:
    name: Local Meetup iOS Sideload IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: lts
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        IPA_NAME: "LocalMeetup"
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create iOS project if needed
        script: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi
      - name: Sync web assets into iOS
        script: |
          npx cap sync ios
      - name: Verify bundled web assets
        script: |
          echo "Checking dist assets"
          test -f "$CM_BUILD_DIR/dist/app-fixes.js"
          grep -n "app.js?v=14" "$CM_BUILD_DIR/dist/index.html"
          grep -n "app-fixes.js?v=21" "$CM_BUILD_DIR/dist/index.html"
          grep -n "mobile fixes v21 active" "$CM_BUILD_DIR/dist/app-fixes.js"
          echo "Checking iOS bundled assets"
          test -f "$CM_BUILD_DIR/ios/App/App/public/app-fixes.js"
          grep -n "app.js?v=14" "$CM_BUILD_DIR/ios/App/App/public/index.html"
          grep -n "app-fixes.js?v=21" "$CM_BUILD_DIR/ios/App/App/public/index.html"
          grep -n "mobile fixes v21 active" "$CM_BUILD_DIR/ios/App/App/public/app-fixes.js"
      - name: Add iOS location permission text
        script: |
          PLIST="$CM_BUILD_DIR/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string Local Meetup nutzt deinen Standort, um Meetups in deiner Naehe zu finden." "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription Local Meetup nutzt deinen Standort, um Meetups in deiner Naehe zu finden." "$PLIST"
          BUILD_NO="${PROJECT_BUILD_NUMBER:-${BUILD_NUMBER:-$(date +%s)}}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NO" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NO" "$PLIST"
          echo "Using iOS build number $BUILD_NO"
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build unsigned iPhone app
        script: |
          xcodebuild build \
            -workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$CM_BUILD_DIR/ios/App/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      - name: Package IPA for Sideloadly
        script: |
          APP_PATH=$(find "$CM_BUILD_DIR/ios/App/build/Build/Products/Release-iphoneos" -name "*.app" -maxdepth 1 | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found for iphoneos build"
            exit 1
          fi
          IPA_DIR="$CM_BUILD_DIR/build/ios-sideload"
          PAYLOAD_DIR="$IPA_DIR/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          cd "$IPA_DIR"
          zip -qry "$IPA_NAME.ipa" Payload
    artifacts:
      - build/ios-sideload/*.ipa
      - ios/App/build/Build/Products/Release-iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log

  ios-simulator:
    name: Local Meetup iOS Simulator
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: lts
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - $HOME/Library/Caches/CocoaPods
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install
      - name: Build web app
        script: |
          npm run build
      - name: Create iOS project if needed
        script: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi
      - name: Sync web assets into iOS
        script: |
          npx cap sync ios
      - name: Verify bundled web assets
        script: |
          echo "Checking dist assets"
          test -f "$CM_BUILD_DIR/dist/app-fixes.js"
          grep -n "app.js?v=14" "$CM_BUILD_DIR/dist/index.html"
          grep -n "app-fixes.js?v=21" "$CM_BUILD_DIR/dist/index.html"
          grep -n "mobile fixes v21 active" "$CM_BUILD_DIR/dist/app-fixes.js"
          echo "Checking iOS bundled assets"
          test -f "$CM_BUILD_DIR/ios/App/App/public/app-fixes.js"
          grep -n "app.js?v=14" "$CM_BUILD_DIR/ios/App/App/public/index.html"
          grep -n "app-fixes.js?v=21" "$CM_BUILD_DIR/ios/App/App/public/index.html"
          grep -n "mobile fixes v21 active" "$CM_BUILD_DIR/ios/App/App/public/app-fixes.js"
      - name: Add iOS location permission text
        script: |
          PLIST="$CM_BUILD_DIR/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string Local Meetup nutzt deinen Standort, um Meetups in deiner Naehe zu finden." "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription Local Meetup nutzt deinen Standort, um Meetups in deiner Naehe zu finden." "$PLIST"
          BUILD_NO="${PROJECT_BUILD_NUMBER:-${BUILD_NUMBER:-$(date +%s)}}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NO" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NO" "$PLIST"
          echo "Using iOS build number $BUILD_NO"
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build unsigned simulator app
        script: |
          xcodebuild build \
            -workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath "$CM_BUILD_DIR/ios/App/build" \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/build/Build/Products/**/*.app
      - /tmp/xcodebuild_logs/*.log
